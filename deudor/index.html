<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cuentas Deudor</title>
    <link rel="stylesheet" href="css/estilo-deudor.css">
</head>
<body>
    <header class="header-sistema">
        <h1>Sistema de Entregas Pachos</h1>
        <span class="badge-rol">Panel: Deudor</span>
    </header>
    
    <main class="contenedor-principal">
        <section class="tarjeta-saldo-total">
            <h2>Saldo Total Adeudado</h2>
            <div id="monto-gran-total" class="monto-gran-total">$0.00</div>
        </section>

        <section class="seccion-listas">
            <div class="bloque-pendientes">
                <h2>Facturas Pendientes</h2>
                <!-- ID unificado con el JS -->
                <div id="contenedor-facturas-pendientes" class="lista-scrollable">
                    <p class="alerta-vacio">¡Felicidades! No tienes facturas pendientes de pago.</p>
                </div>
            </div>
            <div class="bloque-pagadas">
                <h2>Historial de Facturas Pagadas</h2>
                <div id="historial-pagadas" class="lista-scrollable">
                    <p class="alerta-vacio">No hay registros de facturas pagadas aún.</p>
                </div>
            </div>
        </section>

        <section class="seccion-pago-accion" style="margin-top: 30px; text-align: center;">
            <!-- ID unificado -->
            <button id="btn-registrar-pago" class="btn-primario">Registrar / Reportar un Pago</button>
        </section>

        <!-- ID cambiado a overlay-pago -->
        <div id="overlay-pago" class="capa-oscura-fondo oculto">
            <div class="cuadro-formulario">
                <h3>Reportar Comprobante de Pago</h3>
                <!-- ID cambiado a formulario-pago -->
                <form id="formulario-pago">
                    <div class="grupo-input">
                        <label for="pago-id-factura">ID de la Factura a Pagar: </label>
                        <input type="text" id="pago-id-factura" placeholder="Ej. -OKs..." required>
                    </div>
                    <div class="grupo-input">
                        <label for="monto-pago">Monto a Pagar ($):</label>
                        <!-- ID corregido a monto-pago -->
                        <input type="number" id="monto-pago" placeholder="0.00" min="0.01" step="0.01" required>
                    </div>
                    <div class="grupo-input">
                        <label for="referencia-pago">Referencia / Notas:</label>
                        <!-- ID corregido a referencia-pago -->
                        <input type="text" id="referencia-pago" placeholder="Ej. Transferencia Banesco" required>
                    </div>
                    <div class="acciones-formulario">
                        <!-- ID corregido a btn-cancelar-pago -->
                        <button type="button" id="btn-cancelar-pago" class="btn-cancelar">Cerrar Ventana</button>
                        <button type="submit" class="btn-confirmar">Enviar Pago</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Corregido type="module" para soportar sintaxis import en navegadores -->
    <script type="module" src="js/app-deudor.js"></script>
</body>
</html>
