<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Entregas - Fiador</title>
  <link rel="stylesheet" href="css/estilo-fiador.css">
</head>
<body>

  <!-- Encabezado Principal -->
  <header class="header-sistema">
    <h1>Sistema de Entregas Pachos</h1>
    <span class="badge-rol">Panel: Fiador</span>
  </header>

  <main class="contenedor-principal">
    
    <!-- SECCIÓN 1: Controladores y Generación de Facturas -->
    <section class="seccion-control">
      <button id="btn-abrir-factura" class="btn-primario">Crear Entrega / Factura</button>
      
      <!-- Contenedor de fondo oscuro que centra la ventana flotante -->
      <div id="capa-formulario-flotante" class="capa-oscura-fondo oculto">
        
        <!-- Cuadro de generación de facturas centrado y compacto[cite: 1] -->
        <div id="contenedor-formulario" class="cuadro-formulario">
          <h3>Nueva Factura</h3>
          <form id="form-factura">
            <div class="meta-info-automatica">
              <p><strong>ID:</strong> <span id="factura-id-automatico">----</span></p>
              <p><strong>Fecha:</strong> <span id="factura-fecha-automatica">--/--/----</span></p>
            </div>
            
            <div class="grupo-input">
              <label for="deudor-seleccionado">Nombre del Deudor:</label>
              <input type="text" id="deudor-seleccionado" placeholder="Nombre del deudor" required>
            </div>

            <div class="grupo-input">
              <label>Productos:</label>
              <div id="lista-productos-inputs">
                <!-- Fila inicial compactada -->
                <div class="fila-producto">
                  <input type="text" placeholder="Producto (ej. Pan dulce)" class="prod-nombre" required>
                  <input type="number" placeholder="Cant." class="prod-cantidad" min="1" value="1" required>
                  <input type="number" placeholder="Precio U." class="prod-precio" min="0" step="0.01" required>
                </div>
              </div>
              <button type="button" id="btn-agregar-producto" class="btn-secundario" style="margin-top: 10px;">+ Añadir otro producto</button>
            </div>

            <div class="monto-total-container">
              <span>Monto Total: $</span>
              <span id="monto-total-automatico">0.00</span>
            </div>

            <div class="acciones-formulario">
              <button type="button" id="btn-cancelar-factura" class="btn-cancelar">Cerrar Ventana</button>
              <button type="submit" class="btn-confirmar">Cerrar Factura</button>
            </div>
          </form>
        </div>

      </div>
    </section>

    <!-- SECCIÓN 2: Historial de Facturas y Pagos Recibidos -->
    <section class="seccion-listas">
      
      <div class="bloque-historial">
        <h2>Historial de Facturas</h2>
        <!-- Contenedor con scroll para los recuadros pequeños de facturas -->
        <div id="historial-facturas" class="lista-scrollable">
          <!-- Las facturas se cargarán dinámicamente aquí -->
          <p class="alerta-vacio">No hay facturas registradas en el historial.</p>
        </div>
      </div>

      <div class="bloque-pagos">
        <h2>Pagos Recibidos</h2>
        <div id="historial-pagos" class="lista-scrollable">
          <!-- Los pagos enviados por el deudor aparecerán aquí[cite: 1] -->
          <p class="alerta-vacio">No se han recibido notificaciones de pago.</p>
        </div>
      </div>

    </section>

  </main>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
      }
    }
  </script>
  <script type="module" src="js/app-fiador.js"></script>
</body>
</html>
